<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #fefae7; /* Hardcoded surface fallback */
        }
        .otp-input:focus {
            outline: none;
            border-bottom: 2px solid #49672f;
            background-color: #ffffff;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#fefae7] dark:bg-stone-950 flex items-center justify-between px-6 py-4">
<div class="flex items-center gap-4">
<button class="hover:opacity-80 transition-opacity scale-95 duration-200 text-[#49672f] dark:text-[#81a263]" onclick="window.location.href='{{DATA:SCREEN:SCREEN_10}}'">
<span class="material-symbols-outlined">arrow_back</span>
</button>
</div>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg text-[#49672f] dark:text-[#81a263]">Verify Code</h1>
<div class="w-6"></div> <!-- Spacer for centering -->
</header>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-8 pt-24 pb-32 max-w-md mx-auto w-full">
<!-- Header Section -->
<div class="text-center mb-12 space-y-4">
<div class="inline-flex items-center justify-center w-20 h-20 bg-surface-container-high rounded-lg mb-6 shadow-sm">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">mark_email_read</span>
</div>
<h2 class="font-headline text-3xl font-bold tracking-tight text-on-surface">Verify your email</h2>
<p class="font-body text-on-surface-variant leading-relaxed">
                We've sent a 6-digit code to your email address. Please enter it below to complete your registration.
            </p>
</div>
<!-- OTP Input Grid -->
<div class="grid grid-cols-6 gap-3 w-full mb-8">
<input class="otp-input w-full h-16 text-center text-2xl font-bold rounded-lg border-none bg-surface-container-highest transition-all duration-300 shadow-sm" maxlength="1" placeholder="-" type="text"/>
<input class="otp-input w-full h-16 text-center text-2xl font-bold rounded-lg border-none bg-surface-container-highest transition-all duration-300 shadow-sm" maxlength="1" placeholder="-" type="text"/>
<input class="otp-input w-full h-16 text-center text-2xl font-bold rounded-lg border-none bg-surface-container-highest transition-all duration-300 shadow-sm" maxlength="1" placeholder="-" type="text"/>
<input class="otp-input w-full h-16 text-center text-2xl font-bold rounded-lg border-none bg-surface-container-highest transition-all duration-300 shadow-sm" maxlength="1" placeholder="-" type="text"/>
<input class="otp-input w-full h-16 text-center text-2xl font-bold rounded-lg border-none bg-surface-container-highest transition-all duration-300 shadow-sm" maxlength="1" placeholder="-" type="text"/>
<input class="otp-input w-full h-16 text-center text-2xl font-bold rounded-lg border-none bg-surface-container-highest transition-all duration-300 shadow-sm" maxlength="1" placeholder="-" type="text"/>
</div>
<!-- Timer and Resend -->
<div class="flex flex-col items-center gap-2 mb-12">
<p class="font-label text-sm text-on-surface-variant">Didn't receive the code?</p>
<div class="flex items-center gap-2">
<button class="font-label text-primary font-bold hover:underline transition-all opacity-50 cursor-not-allowed">Resend Code</button>
<span class="text-xs font-mono py-1 px-3 bg-surface-container rounded-full text-on-surface-variant">Resend in 0:45</span>
</div>
</div>
<!-- Footer Action -->
<div class="w-full mt-auto space-y-4">
<button class="w-full h-14 bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-semibold rounded-full shadow-lg shadow-primary/20 flex items-center justify-center gap-2 active:scale-[0.98] transition-transform" onclick="window.location.href='{{DATA:SCREEN:SCREEN_18}}'">
<span>Verify &amp; Continue</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
<p class="text-center text-xs text-on-surface-variant/60 font-body px-8">
                By continuing, you agree to Fridge Friend's Terms of Service and Privacy Policy.
            </p>
</div>
<!-- Decorative Organic Shape -->
<div class="fixed -bottom-24 -left-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed top-1/3 -right-24 w-48 h-48 bg-tertiary-container/10 rounded-full blur-3xl pointer-events-none"></div>
</main>
<!-- Navigation Shell -->
<nav class="fixed bottom-0 w-full bg-surface-container-lowest border-t border-outline-variant/30 px-6 py-3 flex justify-between items-center z-50">
<button class="flex flex-col items-center gap-1 text-on-surface-variant hover:text-primary transition-colors" onclick="window.location.href='{{DATA:SCREEN:SCREEN_30}}'">
<span class="material-symbols-outlined">inventory_2</span>
<span class="text-[10px] font-label font-semibold">Inventory</span>
</button>
<button class="flex flex-col items-center gap-1 text-on-surface-variant hover:text-primary transition-colors" onclick="window.location.href='{{DATA:SCREEN:SCREEN_27}}'">
<span class="material-symbols-outlined">search</span>
<span class="text-[10px] font-label font-semibold">Search</span>
</button>
<button class="flex flex-col items-center gap-1 text-on-surface-variant hover:text-primary transition-colors" onclick="window.location.href='{{DATA:SCREEN:SCREEN_28}}'">
<span class="material-symbols-outlined">shopping_basket</span>
<span class="text-[10px] font-label font-semibold">Basket</span>
</button>
<button class="flex flex-col items-center gap-1 text-on-surface-variant hover:text-primary transition-colors" onclick="window.location.href='{{DATA:SCREEN:SCREEN_23}}'">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-label font-semibold">Profile</span>
</button>
</nav>
