<script>
        function filterInventory(type, element) {
            // UI Only Filter Simulation
            const tabs = document.querySelectorAll('.inventory-tab');
            tabs.forEach(tab => {
                tab.classList.remove('bg-primary', 'text-on-primary', 'shadow-sm');
                tab.classList.add('text-on-surface-variant');
            });
            
            element.classList.remove('text-on-surface-variant');
            element.classList.add('bg-primary', 'text-on-primary', 'shadow-sm');

            // Simple visual feedback: flash the list
            const list = document.getElementById('inventory-list');
            list.style.opacity = '0.5';
            setTimeout(() => {
                list.style.opacity = '1';
                // In a real app, logic to filter the actual items would go here
                console.log('Filtering list for:', type);
            }, 150);
        }
    </script>
