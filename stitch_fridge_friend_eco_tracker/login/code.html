<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body {
            background-color: #fefae7;
            font-family: 'Be Vietnam Pro', sans-serif;
        }
        h1, h2, h3, .headline-font {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

<style>
    body {
      min-height: max(884px, 100dvh);

<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#fefae7]/70 backdrop-blur-xl">
<div class="flex justify-between items-center px-6 h-16 w-full max-w-lg mx-auto">
<div class="w-10 flex items-center justify-start">
<button class="p-2 rounded-full hover:bg-stone-200/50 transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined text-lime-900" data-icon="close">close</span>
</button>
</div>
<h1 class="text-xl font-bold text-lime-900 tracking-tight">Fridge Friend</h1>
<div class="w-10"></div>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-6 pt-24 pb-32">
<div class="w-full max-w-md space-y-12">
<!-- Hero Section -->
<div class="space-y-4">
<div class="w-24 h-24 bg-surface-container rounded-lg overflow-hidden mb-8 transform -rotate-3 hover:rotate-0 transition-transform duration-500">
<img alt="Fresh vegetables in a fridge" class="w-full h-full object-cover" data-alt="Close-up of vibrant fresh organic vegetables with soft morning light, minimalist aesthetic with clean white and green tones" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD1DYZyt7HcXQXvpozeOFHKj2zGhNIhDfupBa7rO1WDgFye249azDcpi3GOeAQGVK4t6zn_hvsfUFAd_3Phf3pTu4lO9Z-A0u63prChs_Q8LEAJk4C1vFU20Hoo0sQ4s5LmPkr4uJ59uSoaMv01MrAaeweT5g1WnCFZxFmmxE2KHoOb7hQzH8LiLTz7kUAE7688Y01AWcHxhn8SKoZlaEXtE-QnTw-bSNm1lGrX5tlyBvwCGEcpF2g7BuvyqgrfSLoeOlmvOETMsWHF"/>
</div>
<h2 class="text-display-lg text-4xl md:text-5xl font-bold text-on-surface tracking-tight leading-tight">
                    Welcome <br/><span class="text-primary">back.</span>
</h2>
<p class="text-body-md text-on-surface-variant max-w-[280px]">
                    Your digital larder is waiting. Let's see what's fresh today.
                </p>
</div>
<!-- Login Form -->
<form class="space-y-6" onsubmit="event.preventDefault(); window.location.href='{{DATA:SCREEN:SCREEN_18}}'">
<div class="space-y-1">
<label class="block text-label-md font-semibold text-primary px-1">Email Address</label>
<input class="w-full bg-surface-container-highest border-none rounded-t-none rounded-b-lg border-b-2 border-transparent focus:border-primary focus:ring-0 transition-all duration-300 placeholder:text-stone-400 py-4 px-4 text-body-md" placeholder="hello@fridgefriend.com" type="email"/>
</div>
<div class="space-y-1">
<div class="flex justify-between items-center px-1">
<label class="block text-label-md font-semibold text-primary">Password</label>
<a class="text-label-md font-semibold text-on-surface-variant hover:text-primary transition-colors" href="{{DATA:SCREEN:SCREEN_22}}">Forgot Password?</a>
</div>
<input class="w-full bg-surface-container-highest border-none rounded-t-none rounded-b-lg border-b-2 border-transparent focus:border-primary focus:ring-0 transition-all duration-300 placeholder:text-stone-400 py-4 px-4 text-body-md" placeholder="••••••••" type="password"/>
</div>
<button class="w-full bg-gradient-to-br from-[#49672f] to-[#81a263] text-white py-4 rounded-full font-semibold text-md shadow-sm active:scale-95 transition-all duration-150 mt-4" type="submit">
                    Login
                </button>
</form>
<!-- Social Login -->
<div class="space-y-8">
<div class="relative flex items-center justify-center">
<div class="absolute inset-0 flex items-center">
<div class="w-full h-[1px] bg-outline-variant opacity-20"></div>
</div>
<span class="relative px-4 bg-surface text-label-md text-stone-400 font-medium">OR CONTINUE WITH</span>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 bg-surface-container-highest py-4 rounded-full hover:opacity-90 active:scale-95 transition-all" onclick="window.location.href='{{DATA:SCREEN:SCREEN_18}}'">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="google">google</span>
<span class="text-label-md font-bold text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-3 bg-surface-container-highest py-4 rounded-full hover:opacity-90 active:scale-95 transition-all" onclick="window.location.href='{{DATA:SCREEN:SCREEN_18}}'">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="apple">ios</span>
<span class="text-label-md font-bold text-on-surface">Apple</span>
</button>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 bg-[#fefae7]/70 backdrop-blur-xl flex justify-around items-center px-4 pb-8 pt-4">
<div class="flex flex-col items-center justify-center bg-gradient-to-br from-[#49672f] to-[#81a263] text-white rounded-full px-8 py-2 active:scale-95 transition-all cursor-pointer" onclick="window.location.reload()">
<span class="material-symbols-outlined mb-0.5" data-icon="login">login</span>
<span class="text-[0.75rem] font-bold">Login</span>
</div>
<div class="flex flex-col items-center justify-center text-stone-500 hover:opacity-90 active:scale-95 transition-all px-8 py-2 cursor-pointer" onclick="window.location.href='{{DATA:SCREEN:SCREEN_10}}'">
<span class="material-symbols-outlined mb-0.5" data-icon="person_add">person_add</span>
<span class="text-[0.75rem] font-bold">Join</span>
</div>
</nav>
<!-- Decorative Elements for Editorial Feel -->
<div class="fixed top-20 right-[-5%] w-64 h-64 bg-primary/5 rounded-full blur-3xl -z-10"></div>
<div class="fixed bottom-40 left-[-10%] w-80 h-80 bg-tertiary/5 rounded-full blur-3xl -z-10"></div>
